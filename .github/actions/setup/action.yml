name: Setup Environment
description: Shared setup for CI jobs (PHP, Node, Composer, NPM, build, env, migrations)

runs:
  using: composite
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, pdo_mysql, intl, json, tokenizer, xml, ctype, fileinfo
        coverage: none

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm

    - name: Install Composer dependencies
      run: composer install --no-interaction --prefer-dist --no-progress
      shell: bash
      env:
        CACHE_STORE: array
        SESSION_DRIVER: array
        QUEUE_CONNECTION: sync

    - name: Install NPM dependencies
      run: npm ci
      shell: bash

    - name: Build frontend assets
      run: npm run build
      shell: bash

    - name: Prepare environment
      run: |
        cp .env.example .env
        php artisan key:generate --no-interaction --force
      shell: bash
      env:
        CACHE_STORE: array
        SESSION_DRIVER: array
        QUEUE_CONNECTION: sync

    - name: Run migrations
      run: php artisan migrate --no-interaction --force
      shell: bash
