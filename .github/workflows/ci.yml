name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: mipress
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: mipress
      DB_USERNAME: root
      DB_PASSWORD: ""
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout package repositories
        run: |
          mkdir -p packages/mipress
          if [ ! -d packages/mipress/core ]; then
            git clone --depth 1 https://github.com/michalcabala/mipress-core.git packages/mipress/core
          fi
          if [ ! -d packages/mipress/forms ]; then
            git clone --depth 1 https://github.com/michalcabala/mipress-forms.git packages/mipress/forms
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, intl, json, tokenizer, xml, ctype, fileinfo
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction --force

      - name: Run migrations
        run: php artisan migrate --no-interaction --force

      - name: Lint with Pint
        run: vendor/bin/pint --test

      - name: Run production smoke tests
        run: composer test:smoke

  test:
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: mipress
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: mipress
      DB_USERNAME: root
      DB_PASSWORD: ""
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout package repositories
        run: |
          mkdir -p packages/mipress
          if [ ! -d packages/mipress/core ]; then
            git clone --depth 1 https://github.com/michalcabala/mipress-core.git packages/mipress/core
          fi
          if [ ! -d packages/mipress/forms ]; then
            git clone --depth 1 https://github.com/michalcabala/mipress-forms.git packages/mipress/forms
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, intl, json, tokenizer, xml, ctype, fileinfo
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction --force

      - name: Run migrations
        run: php artisan migrate --no-interaction --force

      - name: Run tests
        run: composer test:ci
