name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Prepare environment
        run: cp .env.example .env

      - name: Checkout local path packages
        env:
          MIPRESS_PACKAGES_TOKEN: ${{ secrets.MIPRESS_PACKAGES_TOKEN }}
        run: |
          set -e
          mkdir -p packages/mipress

          clone_package() {
            repo="$1"
            path="$2"

            if [ -f "$path/composer.json" ]; then
              echo "Package already available at $path"
              return
            fi

            if [ -n "$MIPRESS_PACKAGES_TOKEN" ]; then
              git clone --depth=1 "https://x-access-token:${MIPRESS_PACKAGES_TOKEN}@github.com/michalcabala/${repo}.git" "$path"
            else
              git clone --depth=1 "https://github.com/michalcabala/${repo}.git" "$path"
            fi
          }

          clone_package mipress-core packages/mipress/core
          clone_package mipress-forms packages/mipress/forms
          clone_package mipress-social-feeds packages/mipress/social-feeds

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run smoke tests
        run: composer test:smoke

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3

      - name: Prepare environment
        run: cp .env.example .env

      - name: Checkout local path packages
        env:
          MIPRESS_PACKAGES_TOKEN: ${{ secrets.MIPRESS_PACKAGES_TOKEN }}
        run: |
          set -e
          mkdir -p packages/mipress

          clone_package() {
            repo="$1"
            path="$2"

            if [ -f "$path/composer.json" ]; then
              echo "Package already available at $path"
              return
            fi

            if [ -n "$MIPRESS_PACKAGES_TOKEN" ]; then
              git clone --depth=1 "https://x-access-token:${MIPRESS_PACKAGES_TOKEN}@github.com/michalcabala/${repo}.git" "$path"
            else
              git clone --depth=1 "https://github.com/michalcabala/${repo}.git" "$path"
            fi
          }

          clone_package mipress-core packages/mipress/core
          clone_package mipress-forms packages/mipress/forms
          clone_package mipress-social-feeds packages/mipress/social-feeds

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Run full test suite
        run: composer test:ci
